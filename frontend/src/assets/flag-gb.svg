<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30" width="24" height="16" preserveAspectRatio="xMidYMid meet">
  <rect width="60" height="30" fill="#012169"/>
  <!-- White diagonals -->
  <path d="M0 0 L60 30 M60 0 L0 30" stroke="#fff" stroke-width="6" stroke-linecap="square"/>
  <!-- Red diagonals -->
  <path d="M0 0 L60 30 M60 0 L0 30" stroke="#C8102E" stroke-width="3" stroke-linecap="square"/>
  <!-- White cross -->
  <rect x="0" y="12" width="60" height="6" fill="#fff"/>
  <rect x="27" y="0" width="6" height="30" fill="#fff"/>
  <!-- Red cross -->
  <rect x="0" y="13.5" width="60" height="3" fill="#C8102E"/>
  <rect x="28.5" y="0" width="3" height="30" fill="#C8102E"/>
</svg>
